<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>德州撲克新人基礎觀念練習</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
    background: #0f3a2a;
    color: #1a1a1a;
    -webkit-text-size-adjust: 100%;
    line-height: 1.5;
  }
  body {
    min-height: 100vh;
    padding: 16px;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 560px;
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    padding: 20px 18px 24px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 6px;
    color: #0f3a2a;
    letter-spacing: 0.5px;
  }
  .subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 22px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px 14px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 12px;
    text-align: center;
    transition: background 0.15s, transform 0.05s;
    font-family: inherit;
  }
  .btn-primary {
    background: #0f5132;
    color: #fff;
  }
  .btn-primary:active { transform: scale(0.98); background: #0a3d24; }
  .btn-secondary {
    background: #e9ecef;
    color: #1a1a1a;
  }
  .btn-secondary:active { transform: scale(0.98); background: #d6dade; }
  .btn-disabled {
    background: #cfd2d6 !important;
    color: #6c757d !important;
    cursor: not-allowed;
  }

  .progress-wrap {
    margin-bottom: 14px;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px;
    background: #e9ecef;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #0f5132;
    width: 0%;
    transition: width 0.25s ease;
  }

  .level-current {
    display: inline-block;
    background: #e7f1ec;
    color: #0f5132;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }

  .category-tag {
    display: inline-block;
    background: #e7f1ec;
    color: #0f5132;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 17px;
    line-height: 1.6;
    color: #1a1a1a;
    margin: 0 0 18px;
    font-weight: 500;
  }

  .options { margin-top: 10px; }
  .option {
    width: 100%;
    text-align: left;
    padding: 14px 14px;
    margin-bottom: 10px;
    border: 2px solid #ced4da;
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    line-height: 1.5;
    cursor: pointer;
    color: #1a1a1a;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
    word-wrap: break-word;
  }
  .option:active { background: #f1f3f5; }

  .option.selected-correct {
    border-color: #198754;
    background: #d1e7dd;
    color: #0a3622;
  }
  .option.selected-wrong {
    border-color: #dc3545;
    background: #f8d7da;
    color: #58151c;
  }
  .option.selected-unknown {
    border-color: #6c757d;
    background: #f1f3f5;
    color: #495057;
  }
  .option.show-correct {
    border-color: #198754;
    background: #d1e7dd;
    color: #0a3622;
  }
  .option.locked { cursor: default; }

  .option .mark {
    float: right;
    font-weight: 700;
    margin-left: 8px;
  }
  .option.selected-correct .mark::before { content: "✓ 你選"; color: #0f5132; }
  .option.selected-wrong .mark::before { content: "✗ 你選"; color: #842029; }
  .option.selected-unknown .mark::before { content: "? 你選"; color: #495057; }
  .option.show-correct:not(.selected-correct) .mark::before { content: "✓ 正解"; color: #0f5132; }

  .feedback {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border-left: 5px solid #198754;
    background: #f1faf5;
  }
  .feedback.wrong {
    border-left-color: #dc3545;
    background: #fdf3f4;
  }
  .feedback.unknown {
    border-left-color: #6c757d;
    background: #f5f7f6;
  }
  .feedback-title {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
  }
  .feedback.correct .feedback-title { color: #0f5132; }
  .feedback.wrong .feedback-title { color: #842029; }
  .feedback.unknown .feedback-title { color: #495057; }
  .feedback-row {
    font-size: 14.5px;
    color: #1a1a1a;
    margin-top: 6px;
  }
  .feedback-row b { color: #0f3a2a; }

  .result-summary {
    text-align: center;
    padding: 8px 0 10px;
  }
  .score-big {
    font-size: 56px;
    font-weight: 800;
    color: #0f5132;
    line-height: 1.1;
    margin: 8px 0;
  }
  .score-unit { font-size: 24px; color: #555; font-weight: 600; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 18px 0 8px;
  }
  .stats.four {
    grid-template-columns: repeat(2, 1fr);
  }
  .stat {
    background: #f5f7f6;
    border-radius: 10px;
    padding: 12px 6px;
    text-align: center;
  }
  .stat .num {
    font-size: 22px;
    font-weight: 700;
    color: #0f3a2a;
  }
  .stat .label {
    font-size: 12.5px;
    color: #555;
    margin-top: 4px;
  }
  .stat.correct .num { color: #0f5132; }
  .stat.wrong .num { color: #b02a37; }
  .stat.unknown .num { color: #495057; }

  .pass-banner {
    margin: 14px 0 4px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
  }
  .pass-banner.pass {
    background: #d1e7dd;
    color: #0f5132;
    border: 1px solid #a3cfbb;
  }
  .pass-banner.fail {
    background: #f8d7da;
    color: #842029;
    border: 1px solid #ebbac0;
  }
  .pass-banner .sub {
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
    color: #1a1a1a;
  }

  .encourage {
    margin: 12px 0 4px;
    padding: 14px;
    background: #f1faf5;
    border-radius: 10px;
    text-align: center;
    font-size: 15px;
    color: #0f3a2a;
    font-weight: 500;
    line-height: 1.6;
  }
  .reminder {
    margin: 12px 0 4px;
    padding: 12px 14px;
    background: #fffbe6;
    border-left: 5px solid #d4a017;
    border-radius: 8px;
    font-size: 13.5px;
    color: #5c4a00;
    line-height: 1.6;
  }

  .review-item {
    border: 1px solid #e0e3e6;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    background: #fff;
  }
  .review-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .review-num {
    font-weight: 700;
    color: #0f3a2a;
    font-size: 14px;
  }
  .review-q {
    font-size: 15.5px;
    margin: 6px 0 10px;
    color: #1a1a1a;
    font-weight: 500;
  }
  .review-row {
    font-size: 14px;
    margin: 4px 0;
  }
  .review-row .lbl {
    display: inline-block;
    min-width: 78px;
    color: #555;
  }
  .review-row .your-wrong { color: #b02a37; font-weight: 600; }
  .review-row .your-unknown { color: #495057; font-weight: 600; }
  .review-row .right { color: #0f5132; font-weight: 600; }
  .review-options {
    margin: 8px 0 6px;
    padding: 0;
    list-style: none;
  }
  .review-options li {
    padding: 8px 10px;
    border: 1px solid #e0e3e6;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
    background: #fff;
  }
  .review-options li.is-correct {
    border-color: #198754;
    background: #d1e7dd;
    color: #0a3622;
  }
  .review-options li.is-user-wrong {
    border-color: #dc3545;
    background: #f8d7da;
    color: #58151c;
  }
  .review-options li.is-user-unknown {
    border-color: #6c757d;
    background: #f1f3f5;
    color: #495057;
  }
  .review-options li.is-unknown-opt {
    border-style: dashed;
  }
  .review-options .opt-tag {
    float: right;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
  }
  .review-explain {
    margin-top: 8px;
    padding: 10px;
    background: #f5f7f6;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    line-height: 1.55;
  }
  .empty-msg {
    text-align: center;
    padding: 30px 12px;
    color: #0f3a2a;
    font-size: 16px;
    font-weight: 500;
    background: #f1faf5;
    border-radius: 10px;
  }
  .footer-note {
    margin-top: 18px;
    text-align: center;
    font-size: 12px;
    color: #888;
  }

  /* ===== Level cards (首頁) ===== */
  .level-list { margin-top: 4px; }
  .level-card {
    border: 2px solid #d6dade;
    border-radius: 12px;
    padding: 16px 16px;
    margin-bottom: 14px;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .level-card:active { background: #f5f7f6; }
  .level-card.expanded {
    border-color: #0f5132;
    box-shadow: 0 4px 14px rgba(15, 81, 50, 0.14);
  }
  @media (hover: hover) {
    .level-card:hover { border-color: #0f5132; }
  }
  .level-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .level-name {
    font-size: 18px;
    font-weight: 700;
    color: #0f3a2a;
  }
  .level-meta {
    font-size: 12.5px;
    color: #555;
  }
  .level-toggle-hint {
    font-size: 12.5px;
    color: #0f5132;
    font-weight: 600;
  }
  .level-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e9ecef;
  }
  .level-card.expanded .level-detail { display: block; }
  .level-section { margin-bottom: 10px; }
  .level-section-title {
    font-size: 13px;
    font-weight: 700;
    color: #0f5132;
    margin-bottom: 4px;
  }
  .level-section ul {
    margin: 0;
    padding-left: 20px;
    font-size: 14px;
    color: #333;
    line-height: 1.65;
  }
  .level-pass-line {
    font-size: 13px;
    color: #555;
    margin-top: 4px;
  }
  .level-pass-line b { color: #0f3a2a; }

  @media (max-width: 380px) {
    .app { padding: 16px 14px; }
    h1 { font-size: 20px; }
    .question-text { font-size: 16px; }
    .option { font-size: 15px; padding: 13px 12px; }
    .score-big { font-size: 48px; }
    .level-name { font-size: 16.5px; }
  }
</style>
</head>
<body>
  <div class="app" id="app"></div>

<script>
  // ============================
  // LEVELS 等級設定區
  // 用來修改 LV1 / LV2 / LV3 的名稱、測驗內容、達成條件、通過分數。
  // 改等級找 LEVELS。
  // ============================
  const LEVELS = [
    {
      id: 'LV1',
      name: '計分員 LV.1',
      passScore: 85,
      contents: ['基本記分員知識與流程', '兩副牌流程'],
      requirements: ['分數達到 85 分', '流程沒問題', '洗牌 20 秒內']
    },
    {
      id: 'LV2',
      name: '計分員 LV.2',
      passScore: 85,
      contents: ['會奧瑪哈', '至少會一個小遊戲'],
      requirements: ['會算 POT', '分數達到 85 分']
    },
    {
      id: 'LV3',
      name: '計分員 LV.3',
      passScore: 85,
      contents: ['TDA 規則'],
      requirements: ['分數達到 85 分', '了解 TDA']
    }
  ];

  // ============================
  // QUESTIONS 題庫設定區
  // 用來修改題目、選項、正確答案、解釋、題目所屬等級。
  // 改題目找 QUESTIONS。
  // 新增題目：加到 QUESTIONS。
  // 修改題目：修改對應 id，例如 Q021。
  // 刪除題目：從 QUESTIONS 移除該題。
  // 調整題目出現在哪個 LV：修改 levels。
  // levels: ['LV1'] 代表只出現在 LV1。
  // levels: ['LV1', 'LV2'] 代表出現在 LV1 和 LV2。
  // levels: ['LV3'] 代表只出現在 LV3。
  // ============================
  const QUESTIONS = [
    {
      id: 'Q001', levels: ['LV1'], category: '位置觀念', type: 'tf',
      question: 'SB（Small Blind，小盲）是德州撲克中的小盲位置。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: 'SB 是 Small Blind，也就是小盲，通常需要投入小盲注。'
    },
    {
      id: 'Q002', levels: ['LV1'], category: '位置觀念', type: 'tf',
      question: 'BB（Big Blind，大盲）是德州撲克中的大盲位置。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: 'BB 是 Big Blind，也就是大盲，通常需要投入大盲注。'
    },
    {
      id: 'Q003', levels: ['LV1'], category: '位置觀念', type: 'mc',
      question: 'Button 在德州撲克中通常代表什麼？',
      options: [
        'A. 莊家位置',
        'B. 大盲位置',
        'C. 棄牌區',
        'D. 底池位置',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: 'Button 代表莊家位置，會影響發牌順序與行動順序。'
    },
    {
      id: 'Q004', levels: ['LV1'], category: '基礎牌局', type: 'tf',
      question: '德州撲克中，每位玩家一開始會拿到兩張自己的底牌。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '底牌是只有該玩家自己可以看的手牌。'
    },
    {
      id: 'Q005', levels: ['LV1'], category: '基礎牌局', type: 'tf',
      question: '公共牌是所有仍在牌局中的玩家都可以使用的牌。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '公共牌會發在桌面中央，玩家可用自己的底牌搭配公共牌組成牌型。'
    },
    {
      id: 'Q006', levels: ['LV1'], category: '遊戲回合', type: 'mc',
      question: '德州撲克一手牌通常有哪四個下注回合？',
      options: [
        'A. 翻前、翻牌、轉牌、河牌',
        'B. 開局、中局、後局、結算',
        'C. 小盲、大盲、前注、底池',
        'D. 洗牌、切牌、發牌、收牌',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '德州撲克常見的四個下注回合是翻前、翻牌、轉牌、河牌。'
    },
    {
      id: 'Q007', levels: ['LV1'], category: '遊戲回合', type: 'tf',
      question: 'Flop（翻牌）會一次發出三張公共牌。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '翻牌階段會發出三張公共牌。'
    },
    {
      id: 'Q008', levels: ['LV1'], category: '遊戲回合', type: 'tf',
      question: 'Turn（轉牌）是在 Flop（翻牌）之後發出的一張公共牌。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '轉牌是第四張公共牌。'
    },
    {
      id: 'Q009', levels: ['LV1'], category: '遊戲回合', type: 'tf',
      question: 'River（河牌）是最後一張公共牌。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '河牌是第五張公共牌，也是最後一張公共牌。'
    },
    {
      id: 'Q010', levels: ['LV1'], category: '行動觀念', type: 'mc',
      question: '在一般多人桌情境下，翻牌前第一位行動玩家通常是誰？',
      options: [
        'A. BB 後的下一位有手牌玩家，通常稱為 UTG',
        'B. Button',
        'C. SB',
        'D. 最後入座的玩家',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '一般多人桌翻前通常由 BB 後的下一位有手牌玩家先行動。'
    },
    {
      id: 'Q011', levels: ['LV1'], category: '行動觀念', type: 'mc',
      question: '在一般多人桌情境下，翻牌後第一位行動玩家通常如何判斷？',
      options: [
        'A. Button 後第一位仍有手牌的玩家',
        'B. 翻前最後加注的玩家',
        'C. 籌碼最多的玩家',
        'D. 最先說話的玩家',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '翻後通常從 Button 後第一位仍有手牌的玩家開始行動。'
    },
    {
      id: 'Q012', levels: ['LV1'], category: '動作術語', type: 'mc',
      question: 'Check（過牌）代表什麼？',
      options: [
        'A. 在不用投入更多籌碼的情況下，把行動權交給下一位玩家',
        'B. 直接棄牌',
        'C. 一定要加注',
        'D. 把底池拿走',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '過牌通常發生在目前沒有需要跟注的下注時。'
    },
    {
      id: 'Q013', levels: ['LV1'], category: '動作術語', type: 'mc',
      question: 'Call（跟注）代表什麼？',
      options: [
        'A. 跟上目前需要投入的下注額',
        'B. 放棄手牌',
        'C. 發出公共牌',
        'D. 宣布牌局結束',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '跟注就是投入足夠籌碼，跟上目前的下注額。'
    },
    {
      id: 'Q014', levels: ['LV1'], category: '動作術語', type: 'mc',
      question: 'Raise（加注）代表什麼？',
      options: [
        'A. 在跟上目前下注額之外，再提高下注額',
        'B. 不投入籌碼直接過牌',
        'C. 把手牌丟掉',
        'D. 要求重發牌',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '加注代表把目前需要跟注的金額再提高。'
    },
    {
      id: 'Q015', levels: ['LV1'], category: '動作術語', type: 'mc',
      question: 'Fold（棄牌）代表什麼？',
      options: [
        'A. 放棄本手牌，退出該手牌競爭',
        'B. 增加下注',
        'C. 拿走底池',
        'D. 發出下一張公共牌',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '棄牌後，玩家通常不再參與該手牌的後續競爭。'
    },
    {
      id: 'Q016', levels: ['LV1'], category: '籌碼觀念', type: 'tf',
      question: 'All-in（全下）是指玩家把自己可用於該手牌的籌碼全部投入。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: 'All-in 表示玩家已把可用籌碼全部投入該手牌。'
    },
    {

      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '底池就是本手牌中累積起來、最後由勝者或符合條件的玩家取得的籌碼。'
    },
    {
      id: 'Q018', levels: ['LV1'], category: '開牌觀念', type: 'mc',
      question: 'Showdown（攤牌 / 開牌）通常代表什麼？',
      options: [
        'A. 剩餘玩家亮出手牌，比較牌型決定勝負',
        'B. 開始洗牌',
        'C. 玩家入座',
        'D. 裁判宣布休息',
        'E. 不知道'
      ],
      answer: 0, unknownIndex: 4,
      explanation: '當最後下注回合結束且仍有多名玩家未棄牌時，通常會進入攤牌。'
    },
    {
      id: 'Q019', levels: ['LV1'], category: '桌面安全', type: 'tf',
      question: '如果荷官發現牌組有缺張、混色或破損等異常，應通知裁判或場控處理。',
      options: ['是', '否', '不知道'],
      answer: 0, unknownIndex: 2,
      explanation: '牌組異常可能影響公平性，應交由裁判或場控判斷處理方式。'
    },
    {
      id: 'Q020', levels: ['LV1'], category: '桌面安全', type: 'tf',
      question: '新人遇到自己不確定的牌桌狀況時，應該自己猜測處理，避免打擾裁判。',
      options: ['是', '否', '不知道'],
      answer: 1, unknownIndex: 2,
      explanation: '不確定時應通知裁判或場控，避免自行處理造成更大爭議。'
    }

  // ============================
  // 以下為核心程式邏輯，通常不需要修改
  // 不要動核心程式，除非修 bug 或新增功能。
  // ============================

  // ----- 狀態 -----
  const state = {
    page: 'home',            // home | quiz | result | review | reviewUnknown | redo | redoResult | empty
    currentLevel: null,      // 當前選擇的 LEVEL 物件
    expandedLevelId: null,   // 首頁目前展開的 LV 卡片 id
    // 完整測驗
    answers: [],             // 對應 activeQuestions 的 selectedIndex 或 null
    currentIndex: 0,
    finalRecord: null,       // { correct, wrong, unknown, total, score, passScore, passed }
    // 重做錯題
    redoList: [],            // activeQuestions 中錯題的 index
    redoAnswers: [],
    redoIndex: 0
  };

  const app = document.getElementById('app');

  // ----- 篩選當前 LV 的題目 -----
  function getActiveQuestions() {
    if (!state.currentLevel) return [];
    return QUESTIONS.filter(q => q.levels && q.levels.includes(state.currentLevel.id));
  }

  // ----- 答案分類 -----
  function isUnknownChoice(q, choice) {
    return q.unknownIndex !== undefined && choice === q.unknownIndex;
  }
  function isCorrectChoice(q, choice) {
    return choice === q.answer;
  }
  function isWrongChoice(q, choice) {
    if (choice === null || choice === undefined) return false;
    return !isCorrectChoice(q, choice) && !isUnknownChoice(q, choice);
  }

  // ============================
  // Render router
  // ============================
  function render() {
    window.scrollTo(0, 0);
    switch (state.page) {
      case 'home': return renderHome();
      case 'quiz': return renderQuiz();
      case 'result': return renderResult();
      case 'review': return renderReview();
      case 'reviewUnknown': return renderReviewUnknown();
      case 'redo': return renderRedo();
      case 'redoResult': return renderRedoResult();
      case 'empty': return renderEmpty();
    }
  }

  // ============================
  // 首頁（等級選擇）
  // ============================
  function renderHome() {
    const cards = LEVELS.map(lv => {
      const expanded = state.expandedLevelId === lv.id ? 'expanded' : '';
      const count = QUESTIONS.filter(q => q.levels && q.levels.includes(lv.id)).length;
      return `
        <div class="level-card ${expanded}" data-lv="${lv.id}">
          <div class="level-card-head">
            <div>
              <div class="level-name">${escapeHtml(lv.name)}</div>
              <div class="level-meta">題庫 ${count} 題　通過 ${lv.passScore} 分</div>
            </div>
            <div class="level-toggle-hint">${expanded ? '▲ 收合' : '▼ 展開'}</div>
          </div>
          <div class="level-detail">
            <div class="level-section">
              <div class="level-section-title">測驗內容</div>
              <ul>${lv.contents.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>
            </div>
            <div class="level-section">
              <div class="level-section-title">達成條件</div>
              <ul>${lv.requirements.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
            </div>
            <div class="level-pass-line"><b>通過分數：</b>${lv.passScore} 分</div>
            <button class="btn btn-primary" data-start="${lv.id}">開始測驗</button>
          </div>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <h1>德州撲克新人基礎觀念練習</h1>
      <div class="subtitle">請選擇要練習的計分員等級</div>
      <div class="level-list">${cards}</div>
      <div class="footer-note">v0.2 測試版</div>
    `;

    // 卡片點擊：展開 / 切換
    app.querySelectorAll('.level-card').forEach(card => {
      card.addEventListener('click', (e) => {
        // 點到開始測驗按鈕時，交給按鈕自己的 handler
        if (e.target.closest('[data-start]')) return;
        const lvId = card.getAttribute('data-lv');
        state.expandedLevelId = (state.expandedLevelId === lvId) ? null : lvId;
        render();
      });
    });

    // 開始測驗按鈕
    app.querySelectorAll('[data-start]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const lvId = btn.getAttribute('data-start');
        const lv = LEVELS.find(x => x.id === lvId);
        if (lv) startQuiz(lv);
      });
    });
  }

  // ============================
  // 開始測驗
  // ============================
  function startQuiz(level) {
    state.currentLevel = level;
    const active = getActiveQuestions();
    if (active.length === 0) {
      state.page = 'empty';
      render();
      return;
    }
    state.answers = new Array(active.length).fill(null);
    state.currentIndex = 0;
    state.finalRecord = null;
    state.redoList = [];
    state.redoAnswers = [];
    state.redoIndex = 0;
    state.page = 'quiz';
    render();
  }

  // ============================
  // Quiz（依 LV 篩選後的題目）
  // ============================
  function renderQuiz() {
    const active = getActiveQuestions();
    const total = active.length;
    if (total === 0) { state.page = 'empty'; return render(); }

    const idx = state.currentIndex;
    const q = active[idx];
    const selected = state.answers[idx];
    const locked = selected !== null;
    const pct = Math.round(((idx + (locked ? 1 : 0)) / total) * 100);

    app.innerHTML = `
      <div class="level-current">目前測驗：${escapeHtml(state.currentLevel.name)}</div>
      <div class="progress-wrap">
        <div class="progress-text">
          <span>第 ${idx + 1} / ${total} 題</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="category-tag">${escapeHtml(q.category)}</span>
      <p class="question-text">${escapeHtml(q.question)}</p>
      <div class="options" id="opts"></div>
      <div id="feedbackArea"></div>
    `;

    const opts = document.getElementById('opts');
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = `<span class="text">${escapeHtml(opt)}</span><span class="mark"></span>`;
      if (locked) {
        btn.classList.add('locked');
        applyLockedStyle(btn, i, selected, q);
      } else {
        btn.addEventListener('click', () => onAnswer(i));
      }
      opts.appendChild(btn);
    });

    if (locked) {
      renderFeedback('feedbackArea', q, selected, () => {
        if (idx + 1 >= total) {
          finalizeQuiz();
          state.page = 'result';
        } else {
          state.currentIndex += 1;
        }
        render();
      }, idx + 1 >= total ? '看結果' : '下一題');
    }
  }

  function onAnswer(i) {
    state.answers[state.currentIndex] = i;
    render();
  }

  function finalizeQuiz() {
    const active = getActiveQuestions();
    let correct = 0, unknown = 0;
    state.answers.forEach((a, i) => {
      const q = active[i];
      if (isCorrectChoice(q, a)) correct++;
      else if (isUnknownChoice(q, a)) unknown++;
    });
    const total = active.length;
    const wrong = total - correct - unknown;
    const score = total > 0 ? Math.round((correct / total) * 100) : 0;
    const passScore = state.currentLevel.passScore;
    const passed = score >= passScore;
    state.finalRecord = { correct, wrong, unknown, total, score, passScore, passed };
  }

  // ============================
  // Result（結果頁）
  // ============================
  function renderResult() {
    const r = state.finalRecord;
    const accuracy = r.total > 0 ? Math.round((r.correct / r.total) * 100) : 0;
    const encourage = getEncourage(r.score);
    const wrongCount = r.wrong;
    const unknownCount = r.unknown;

    app.innerHTML = `
      <h1>練習結果</h1>
      <div class="level-current">測驗等級：${escapeHtml(state.currentLevel.name)}</div>
      <div class="result-summary">
        <div class="score-big">${r.score}<span class="score-unit"> 分</span></div>
        <div style="color:#555;font-size:14px;">總題數 ${r.total} 題</div>
      </div>
      <div class="pass-banner ${r.passed ? 'pass' : 'fail'}">
        ${r.passed ? '✓ 通過' : '✗ 未通過'}
        <div class="sub">通過門檻：${r.passScore} 分　你的分數：${r.score} 分</div>
      </div>
      <div class="stats four">
        <div class="stat correct">
          <div class="num">${r.correct}</div>
          <div class="label">答對</div>
        </div>
        <div class="stat wrong">
          <div class="num">${r.wrong}</div>
          <div class="label">答錯</div>
        </div>
        <div class="stat unknown">
          <div class="num">${r.unknown}</div>
          <div class="label">不知道</div>
        </div>
        <div class="stat">
          <div class="num">${accuracy}%</div>
          <div class="label">正確率</div>
        </div>
      </div>
      <div class="encourage">${encourage}</div>
      <div class="reminder">實務項目如流程、洗牌時間、POT 計算等，仍需由訓練員現場確認。</div>
      <button class="btn btn-primary" id="reviewBtn">查看錯題</button>
      <button class="btn btn-secondary" id="reviewUnknownBtn">查看不知道題</button>
      <button class="btn ${wrongCount > 0 ? 'btn-secondary' : 'btn-disabled'}" id="redoBtn" ${wrongCount > 0 ? '' : 'disabled'}>重做錯題</button>
      <button class="btn btn-secondary" id="restartBtn">重新開始（回等級選擇）</button>
    `;

    document.getElementById('reviewBtn').addEventListener('click', () => {
      state.page = 'review';
      render();
    });
    document.getElementById('reviewUnknownBtn').addEventListener('click', () => {
      state.page = 'reviewUnknown';
      render();
    });
    if (wrongCount > 0) {
      document.getElementById('redoBtn').addEventListener('click', () => {
        startRedo();
      });
    }
    document.getElementById('restartBtn').addEventListener('click', () => {
      state.currentLevel = null;
      state.expandedLevelId = null;
      state.page = 'home';
      render();
    });
  }

  function getEncourage(score) {
    if (score >= 90) return '基礎觀念很穩，可以進下一階段。';
    if (score >= 70) return '基礎不錯，但錯題要複習。';
    return '建議重做一次，先把基本術語和流程穩住。';
  }

  // ============================
  // Review（錯題列表，僅選錯）
  // ============================
  function renderReview() {
    const active = getActiveQuestions();
    const wrongIdxs = state.answers
      .map((a, i) => isWrongChoice(active[i], a) ? i : -1)
      .filter(i => i !== -1);

    let body;
    if (wrongIdxs.length === 0) {
      body = `<div class="empty-msg">本次沒有錯題。</div>`;
    } else {
      body = wrongIdxs.map(i => buildReviewItem(active[i], i, state.answers[i])).join('');
    }

    app.innerHTML = `
      <h1>錯題列表</h1>
      <div class="level-current">測驗等級：${escapeHtml(state.currentLevel.name)}</div>
      <div class="subtitle">本次答錯 ${wrongIdxs.length} 題（不含「不知道」）</div>
      ${body}
      <button class="btn btn-primary" id="backBtn">回結果頁</button>
    `;
    document.getElementById('backBtn').addEventListener('click', () => {
      state.page = 'result';
      render();
    });
  }

  // ============================
  // Review Unknown（不知道題列表）
  // ============================
  function renderReviewUnknown() {
    const active = getActiveQuestions();
    const idxs = state.answers
      .map((a, i) => isUnknownChoice(active[i], a) ? i : -1)
      .filter(i => i !== -1);

    let body;
    if (idxs.length === 0) {
      body = `<div class="empty-msg">本次沒有不知道題。</div>`;
    } else {
      body = idxs.map(i => buildReviewItem(active[i], i, state.answers[i])).join('');
    }

    app.innerHTML = `
      <h1>不知道題列表</h1>
      <div class="level-current">測驗等級：${escapeHtml(state.currentLevel.name)}</div>
      <div class="subtitle">本次選「不知道」共 ${idxs.length} 題</div>
      ${body}
      <button class="btn btn-primary" id="backBtn">回結果頁</button>
    `;
    document.getElementById('backBtn').addEventListener('click', () => {
      state.page = 'result';
      render();
    });
  }

  // 共用：產生一筆 review 卡片（顯示所有選項與標記）
  function buildReviewItem(q, i, userChoice) {
    const correctAns = q.options[q.answer];
    const userAns = (userChoice !== null && userChoice !== undefined) ? q.options[userChoice] : '（未作答）';
    const userIsUnknown = isUnknownChoice(q, userChoice);
    const userIsWrong = isWrongChoice(q, userChoice);

    const userLine = userIsUnknown
      ? `<div class="review-row"><span class="lbl">你的答案：</span><span class="your-unknown">不知道</span></div>`
      : `<div class="review-row"><span class="lbl">你的答案：</span><span class="${userIsWrong ? 'your-wrong' : 'right'}">${escapeHtml(userAns)}</span></div>`;

    const optsHtml = q.options.map((opt, oi) => {
      const isCorrect = oi === q.answer;
      const isUnknownOpt = q.unknownIndex !== undefined && oi === q.unknownIndex;
      const isUserChoice = oi === userChoice;
      let cls = '';
      let tag = '';
      if (isCorrect) { cls += ' is-correct'; tag = '正解'; }
      if (isUnknownOpt) { cls += ' is-unknown-opt'; }
      if (isUserChoice && isCorrect) { tag = '你選 / 正解'; }
      else if (isUserChoice && isUnknownOpt) { cls += ' is-user-unknown'; tag = '你選（不知道）'; }
      else if (isUserChoice) { cls += ' is-user-wrong'; tag = '你選'; }
      return `<li class="${cls.trim()}"><span>${escapeHtml(opt)}</span>${tag ? `<span class="opt-tag">${tag}</span>` : ''}</li>`;
    }).join('');

    return `
      <div class="review-item">
        <div class="review-head">
          <span class="review-num">第 ${i + 1} 題（${q.id}）</span>
          <span class="category-tag" style="margin:0;">${escapeHtml(q.category)}</span>
        </div>
        <div class="review-q">${escapeHtml(q.question)}</div>
        <ul class="review-options">${optsHtml}</ul>
        ${userLine}
        <div class="review-row"><span class="lbl">正確答案：</span><span class="right">${escapeHtml(correctAns)}</span></div>
        <div class="review-explain">${escapeHtml(q.explanation)}</div>
      </div>
    `;
  }

  // ============================
  // Redo（重做錯題，不含不知道題）
  // ============================
  function startRedo() {
    const active = getActiveQuestions();
    const wrongIdxs = state.answers
      .map((a, i) => isWrongChoice(active[i], a) ? i : -1)
      .filter(i => i !== -1);
    if (wrongIdxs.length === 0) return;
    state.redoList = wrongIdxs;
    state.redoAnswers = new Array(wrongIdxs.length).fill(null);
    state.redoIndex = 0;
    state.page = 'redo';
    render();
  }

  function renderRedo() {
    const active = getActiveQuestions();
    const total = state.redoList.length;
    const idx = state.redoIndex;
    const qIndex = state.redoList[idx];
    const q = active[qIndex];
    const selected = state.redoAnswers[idx];
    const locked = selected !== null;
    const pct = Math.round(((idx + (locked ? 1 : 0)) / total) * 100);

    app.innerHTML = `
      <div class="level-current">重做錯題：${escapeHtml(state.currentLevel.name)}</div>
      <div class="progress-wrap">
        <div class="progress-text">
          <span>重做錯題　第 ${idx + 1} / ${total} 題</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="category-tag">${escapeHtml(q.category)}</span>
      <p class="question-text">${escapeHtml(q.question)}</p>
      <div class="options" id="opts"></div>
      <div id="feedbackArea"></div>
    `;

    const opts = document.getElementById('opts');
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = `<span class="text">${escapeHtml(opt)}</span><span class="mark"></span>`;
      if (locked) {
        btn.classList.add('locked');
        applyLockedStyle(btn, i, selected, q);
      } else {
        btn.addEventListener('click', () => {
          state.redoAnswers[idx] = i;
          render();
        });
      }
      opts.appendChild(btn);
    });

    if (locked) {
      renderFeedback('feedbackArea', q, selected, () => {
        if (idx + 1 >= total) {
          state.page = 'redoResult';
        } else {
          state.redoIndex += 1;
        }
        render();
      }, idx + 1 >= total ? '看重做結果' : '下一題');
    }
  }

  function renderRedoResult() {
    const active = getActiveQuestions();
    const total = state.redoList.length;
    let correct = 0, unknown = 0;
    state.redoAnswers.forEach((a, i) => {
      const q = active[state.redoList[i]];
      if (isCorrectChoice(q, a)) correct++;
      else if (isUnknownChoice(q, a)) unknown++;
    });
    const wrong = total - correct - unknown;
    const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

    app.innerHTML = `
      <h1>錯題重做結果</h1>
      <div class="level-current">測驗等級：${escapeHtml(state.currentLevel.name)}</div>
      <div class="subtitle">本次只計算重做的錯題，不影響原本總分。</div>
      <div class="result-summary">
        <div class="score-big">${accuracy}<span class="score-unit">%</span></div>
        <div style="color:#555;font-size:14px;">重做 ${total} 題　正確率</div>
      </div>
      <div class="stats four">
        <div class="stat">
          <div class="num">${total}</div>
          <div class="label">重做題數</div>
        </div>
        <div class="stat correct">
          <div class="num">${correct}</div>
          <div class="label">答對</div>
        </div>
        <div class="stat wrong">
          <div class="num">${wrong}</div>
          <div class="label">答錯</div>
        </div>
        <div class="stat unknown">
          <div class="num">${unknown}</div>
          <div class="label">不知道</div>
        </div>
      </div>
      <button class="btn btn-primary" id="backBtn">回原本結果頁</button>
      <button class="btn btn-secondary" id="restartBtn">重新開始（回等級選擇）</button>
    `;
    document.getElementById('backBtn').addEventListener('click', () => {
      state.page = 'result';
      render();
    });
    document.getElementById('restartBtn').addEventListener('click', () => {
      state.currentLevel = null;
      state.expandedLevelId = null;
      state.page = 'home';
      render();
    });
  }

  // ============================
  // Empty（該 LV 暫時沒有題目）
  // ============================
  function renderEmpty() {
    app.innerHTML = `
      <h1>${escapeHtml(state.currentLevel ? state.currentLevel.name : '')}</h1>
      <div class="empty-msg">此等級目前尚未建立題目，請先新增題庫。</div>
      <button class="btn btn-primary" id="backBtn">回到首頁</button>
    `;
    document.getElementById('backBtn').addEventListener('click', () => {
      state.currentLevel = null;
      state.expandedLevelId = null;
      state.page = 'home';
      render();
    });
  }

  // ============================
  // Helpers
  // ============================
  function applyLockedStyle(btn, i, selected, q) {
    const correct = q.answer;
    const unknown = q.unknownIndex;
    if (i === selected && i === correct) {
      btn.classList.add('selected-correct');
    } else if (i === selected && unknown !== undefined && i === unknown) {
      btn.classList.add('selected-unknown');
    } else if (i === selected && i !== correct) {
      btn.classList.add('selected-wrong');
    } else if (i === correct) {
      btn.classList.add('show-correct');
    }
  }

  function renderFeedback(containerId, q, selected, onNext, btnLabel) {
    const isCorrect = isCorrectChoice(q, selected);
    const isUnknown = isUnknownChoice(q, selected);
    let feedbackClass, title;
    if (isCorrect) { feedbackClass = 'correct'; title = '答對'; }
    else if (isUnknown) { feedbackClass = 'unknown'; title = '不知道（不計分）'; }
    else { feedbackClass = 'wrong'; title = '不正確'; }

    const correctText = q.options[q.answer];
    const fb = document.getElementById(containerId);
    fb.innerHTML = `
      <div class="feedback ${feedbackClass}">
        <div class="feedback-title">${title}</div>
        <div class="feedback-row"><b>正確答案：</b>${escapeHtml(correctText)}</div>
        <div class="feedback-row"><b>白話解釋：</b>${escapeHtml(q.explanation)}</div>
      </div>
      <button class="btn btn-primary" id="nextBtn">${btnLabel}</button>
    `;
    document.getElementById('nextBtn').addEventListener('click', onNext);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // 啟動
  render();
</script>
</body>
</html>
